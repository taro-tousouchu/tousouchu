<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KBC001 管理者認証システム</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("24210B07-AD93-46FB-89AD-108233D33972.png") center center/cover no-repeat;
font-family:sans-serif;
color:white;
}

.box{
text-align:center;
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
width:80%;
max-width:500px;
}

h1{
color:red;
font-size:50px;
margin-bottom:10px;
}

h2{
color:red;
margin-bottom:30px;
}

input{
width:80%;
padding:15px;
font-size:22px;
background:black;
color:white;
border:2px solid red;
border-radius:10px;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:24px;
background:black;
color:red;
border:2px solid red;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:red;
color:white;
}

#result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h1>KBC001</h1>
<h2>管理者認証システム</h2>

<p>管理者コードを入力せよ</p>

<input id="code" type="password">

<br>

<button onclick="checkCode()">
認証
</button>

<div id="result">
認証待機中...
</div>

</div>

<script>

let miss=0;

function checkCode(){

let code=document.getElementById("code").value;

if(code==="KBC001"){

document.getElementById("result").innerHTML=
"✅ 管理者変更完了！";

let voice=new SpeechSynthesisUtterance(
"管理者変更完了"
);

voice.lang="ja-JP";

speechSynthesis.speak(voice);

setTimeout(function(){

window.location.href=
"https://taro-tousouchu.github.io/tousouchu/";

},3000);

}

else{

miss++;

document.getElementById("result").innerHTML=
"❌ 認証失敗";

if(miss>=3){

document.getElementById("result").innerHTML=
"🚨 不正アクセス検知";

}

}

}

</script>

</body>
</html>
